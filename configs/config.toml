[game]
iso_path = "/opt/ps2env/game/game.iso"
bios_dir = "/opt/ps2env/user/bios"
bios_file = ""
fastboot = true
startup_check = "startup_ready"
episode_check = "episode_ready"
step_checks = []
checks_dir = "../user_env/basic_ps2/checks"
callbacks_dir = "../user_env/basic_ps2/callbacks"
policy_dir = "../user_env/basic_ps2/policy"
env_utils = "../user_env/basic_ps2/env_utils.py"

[workers]
count = 1
display_base = 90
pine_slot_base = 28011

[gpu]
renderer = "vulkan"
vendor = "NVIDIA"

[capture]
width = 1280
height = 720
framerate = 60
game_fps = 60
observation_shape = [180, 320]

[savestates]
episode_start_file = "/opt/ps2env/user/sstates/baseline/episode_start.p2s"
episode_start_slot = 1

[stepping]
n_frames_per_step = 4
after_action = "hold"

[lifecycle]
frames_per_loop = 4
timeout_frames = 1440

[logging]
level = "INFO"
